<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Perawatan — Museum Aceh</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <style>
    .form-center { max-width:820px; margin:0 auto; }
    .cb-grid { display:grid; gap:4px 14px; }
    .cb-grid.col2 { grid-template-columns:1fr 1fr; }
    .cb-grid.col3 { grid-template-columns:1fr 1fr 1fr; }
    .cb-grid.col4 { grid-template-columns:1fr 1fr 1fr 1fr; }
    .cb-grid.col5 { grid-template-columns:1fr 1fr 1fr 1fr 1fr; }
    .cb-grid label { font-size:13px; display:flex; align-items:center; gap:5px; cursor:pointer; padding:3px 0; }
    .radio-group { display:flex; gap:16px; align-items:center; margin-top:4px; }
    .radio-group label { font-size:13px; display:flex; align-items:center; gap:4px; cursor:pointer; }
    .section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--teks-sekunder); padding:10px 0 6px; border-bottom:1px solid var(--abu-border); margin:16px 0 10px; }
    .autocomplete-wrap { position:relative; }
    .autocomplete-list { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--abu-border); border-top:none; border-radius:0 0 8px 8px; max-height:220px; overflow-y:auto; z-index:100; box-shadow:0 4px 12px rgba(0,0,0,.1); display:none; }
    .autocomplete-list.show { display:block; }
    .ac-item { padding:8px 12px; cursor:pointer; font-size:13px; border-bottom:1px solid #f1f1f1; }
    .ac-item:hover { background:#FEF2F2; }
    .ac-item strong { display:block; }
    .ac-item span { font-size:11px; color:var(--teks-sekunder); }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="dashboard.html" class="sidebar-logo-img-wrap"><img src="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/" alt="Museum Aceh" class="sidebar-logo-img"></a>
      <div class="sidebar-logo-divider"></div>
      <div class="sidebar-system-label"><span>Sistem Inventaris</span></div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Menu Utama</span>
      <a href="dashboard.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span class="nav-text">Dashboard</span>
      </a>
      <a href="koleksi.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        <span class="nav-text">Data Koleksi</span>
      </a>
      <a href="berita-acara.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span class="nav-text">Cetak / Download BA</span>
      </a>
      <a href="perawatan.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        <span class="nav-text">Perawatan Koleksi</span>
      </a>
    </nav>
    <div class="sidebar-footer"><p class="sidebar-footer-version">v2.3.0 &mdash; Museum Aceh</p></div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
        <div class="topbar-left"><h1 class="page-title">Input Perawatan</h1><p class="page-subtitle">Form Perawatan Koleksi Baru</p></div>
      </div>
      <div class="topbar-right">
        <div class="user-info"><span id="user-name">Loading...</span><span id="user-role" class="badge-role">-</span></div>
        <button onclick="logout()" class="btn-logout">Keluar</button>
      </div>
    </header>

    <div class="page-content">
      <div class="form-center">
        <div class="card">
          <div class="card-header"><h3 class="card-title">Form Perawatan Koleksi Baru</h3></div>
          <div class="card-body">
            <form id="form-perawatan" novalidate>

              <!-- Basic Info -->
              <div class="form-group"><label class="form-label">Kode Perawatan <span class="required">*</span></label>
                <input type="text" id="kode_perawatan" class="form-control" placeholder="NO.PK/001/2026" required></div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div class="form-group"><label class="form-label">Tanggal <span class="required">*</span></label>
                  <input type="date" id="tanggal" class="form-control" required></div>
                <div class="form-group"><label class="form-label">Petugas Konservasi <span class="required">*</span></label>
                  <select id="petugas_id" class="form-control" required><option value="">— Pilih Staff —</option></select></div>
              </div>

              <!-- Collection -->
              <div class="section-title">Identifikasi Koleksi</div>
              <div class="form-group autocomplete-wrap">
                <label class="form-label">Cari Koleksi <span class="required">*</span></label>
                <input type="text" id="search-koleksi" class="form-control" placeholder="Ketik nama atau no. inventaris..." autocomplete="off">
                <div class="autocomplete-list" id="ac-list"></div>
                <input type="hidden" id="koleksi_id">
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div class="form-group"><label class="form-label">Nama Koleksi</label><input type="text" id="fill-nama" class="form-control" readonly></div>
                <div class="form-group"><label class="form-label">No. Inventaris</label><input type="text" id="fill-inv" class="form-control" readonly></div>
              </div>
              <div class="form-group"><label class="form-label">Jenis Koleksi</label><input type="text" id="fill-jenis" class="form-control" readonly></div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div class="form-group"><label class="form-label">Asal Koleksi <span class="required">*</span></label>
                  <div class="radio-group">
                    <label><input type="radio" name="asal_koleksi" value="Storage"> Storage</label>
                    <label><input type="radio" name="asal_koleksi" value="Ruang Pamer"> Ruang Pamer</label>
                    <label><input type="radio" name="asal_koleksi" value="RA"> RA</label>
                  </div>
                </div>
                <div class="form-group"><label class="form-label">Jenis (Organik)</label>
                  <div class="radio-group">
                    <label><input type="radio" name="jenis_organik" value="true" checked> Organik</label>
                    <label><input type="radio" name="jenis_organik" value="false"> Anorganik</label>
                  </div>
                </div>
              </div>

              <div class="form-group"><label class="form-label">Material Bahan</label>
                <div class="cb-grid col2" id="cb-material"></div>
                <input type="text" id="material_lainnya" class="form-control" placeholder="Lainnya..." style="margin-top:6px;">
              </div>

              <!-- Kondisi -->
              <div class="section-title">Kondisi Koleksi</div>
              <div class="form-group"><label class="form-label">Kondisi</label><div class="cb-grid col3" id="cb-kondisi"></div></div>
              <div class="form-group"><label class="form-label">Faktor Penyebab Kerusakan</label><div class="cb-grid col2" id="cb-faktor"></div></div>

              <!-- Metode Konservasi -->
              <div class="section-title">Metode Konservasi</div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                <div class="form-group"><label class="form-label">Teknis Penanganan</label>
                  <div class="radio-group"><label><input type="radio" name="teknis_penanganan" value="Basah"> Basah</label><label><input type="radio" name="teknis_penanganan" value="Kering"> Kering</label></div></div>
                <div class="form-group"><label class="form-label">Metode Perawatan</label>
                  <div class="radio-group"><label><input type="radio" name="metode_perawatan" value="Preventif"> Preventif</label><label><input type="radio" name="metode_perawatan" value="Kuratif"> Kuratif</label></div></div>
                <div class="form-group"><label class="form-label">Metode Bahan</label>
                  <div class="radio-group"><label><input type="radio" name="metode_bahan" value="Kimia"> Kimia</label><label><input type="radio" name="metode_bahan" value="Alami"> Alami</label></div></div>
              </div>
              <div class="form-group"><label class="form-label">Alat</label><div class="cb-grid col4" id="cb-alat"></div></div>
              <div class="form-group"><label class="form-label">Bahan</label><div class="cb-grid col5" id="cb-bahan"></div></div>

              <!-- Pengamanan -->
              <div class="section-title">Pengamanan Koleksi</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div class="form-group"><label class="form-label">Bahan Pembungkus</label><div class="cb-grid col2" id="cb-pembungkus"></div></div>
                <div class="form-group"><label class="form-label">Bahan Pengawet</label><div class="cb-grid col2" id="cb-pengawet"></div></div>
              </div>

              <!-- Notes -->
              <div class="section-title">Catatan</div>
              <div class="form-group"><textarea id="catatan" class="form-control" rows="3" placeholder="Catatan opsional..."></textarea></div>

              <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px;">
                <a href="perawatan.html" class="btn btn-ghost">Batal</a>
                <button type="submit" class="btn btn-primary" id="btn-simpan">Simpan Form</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/input-perawatan.js"></script>
</body>
</html>
